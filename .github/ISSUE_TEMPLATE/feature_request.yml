name: Feature Request
description: Suggest a new feature or improvement for boleto.ts
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please fill out the sections below to help us understand your proposal.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the feature you would like to see.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Explain why this feature would be valuable and the problem it solves.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe how you think this feature could be implemented. Code snippets are welcome.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you have considered.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched for existing issues that already request this feature.
          required: true
        - label: I have provided a clear use case for this feature.
          required: true
