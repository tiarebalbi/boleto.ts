# This workflow automatically publishes the package to npm when a new tag is pushed.
# The tag should follow the version format (e.g., v1.0.0 or v1.0.0-beta.1).
# The workflow will:
# 1. Extract the version from the tag
# 2. Run tests to ensure quality
# 3. Build the package
# 4. Publish to npmjs
name: Publish Package

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Set package version from tag
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          # Remove 'v' prefix if present (e.g., v1.0.0 -> 1.0.0)
          VERSION="${TAG_VERSION#v}"
          # Validate that the version follows semver pattern
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Error: Invalid version format '$VERSION'. Expected semver (e.g., 1.0.0, 1.0.0-beta.1)"
            exit 1
          fi
          echo "Setting package version to: $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
